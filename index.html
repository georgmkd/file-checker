<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload & Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .upload-subtext {
            color: #999;
            font-size: 0.9em;
        }

        input[type="file"] {
            display: none;
        }

        .file-info {
            margin-top: 30px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .info-card {
            background: #f8f9ff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #555;
        }

        .info-value {
            color: #333;
            word-break: break-all;
        }

        .status {
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s ease;
            margin-top: 15px;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .file-preview {
            margin-top: 20px;
            text-align: center;
        }

        .file-preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            margin-top: 10px;
        }

        .validation-checks {
            margin-top: 20px;
        }

        .check-item {
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            display: flex;
            align-items: center;
        }

        .check-item.pass {
            background: #d4edda;
            color: #155724;
        }

        .check-item.fail {
            background: #f8d7da;
            color: #721c24;
        }

        .check-icon {
            margin-right: 10px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📁 File Upload & Checker</h1>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📤</div>
            <div class="upload-text">Click to upload or drag and drop</div>
            <div class="upload-subtext">Maximum file size: 10MB</div>
            <input type="file" id="fileInput" accept="*/*">
        </div>

        <div class="file-info" id="fileInfo">
            <div class="status" id="statusMessage"></div>
            
            <div class="info-card">
                <h3 style="margin-bottom: 15px; color: #667eea;">📋 File Information</h3>
                <div class="info-row">
                    <span class="info-label">File Name:</span>
                    <span class="info-value" id="fileName">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">File Size:</span>
                    <span class="info-value" id="fileSize">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">File Type:</span>
                    <span class="info-value" id="fileType">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Last Modified:</span>
                    <span class="info-value" id="lastModified">-</span>
                </div>
            </div>

            <div class="validation-checks" id="validationChecks"></div>

            <div class="file-preview" id="filePreview"></div>

            <button class="btn" onclick="resetUpload()">Upload Another File</button>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB

        // Click to upload
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            handleFile(e.target.files[0]);
        });

        // Drag and drop events
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            handleFile(file);
        });

        function handleFile(file) {
            if (!file) return;

            // Display file info
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = formatFileSize(file.size);
            document.getElementById('fileType').textContent = file.type || 'Unknown';
            document.getElementById('lastModified').textContent = new Date(file.lastModified).toLocaleString();

            // Validate file
            const validationResults = validateFile(file);
            displayValidationResults(validationResults);

            // Show file info
            fileInfo.classList.add('show');
            uploadArea.style.display = 'none';

            // Preview if image
            if (file.type.startsWith('image/')) {
                previewImage(file);
            } else {
                document.getElementById('filePreview').innerHTML = '';
            }
        }

        function validateFile(file) {
            const results = [];

            // Check file size
            if (file.size <= MAX_FILE_SIZE) {
                results.push({
                    pass: true,
                    message: `File size is within limit (${formatFileSize(file.size)})`
                });
            } else {
                results.push({
                    pass: false,
                    message: `File size exceeds 10MB limit (${formatFileSize(file.size)})`
                });
            }

            // Check if file is not empty
            if (file.size > 0) {
                results.push({
                    pass: true,
                    message: 'File is not empty'
                });
            } else {
                results.push({
                    pass: false,
                    message: 'File is empty (0 bytes)'
                });
            }

            // Check file name length
            if (file.name.length <= 255) {
                results.push({
                    pass: true,
                    message: 'File name length is acceptable'
                });
            } else {
                results.push({
                    pass: false,
                    message: 'File name is too long (>255 characters)'
                });
            }

            // Check for file extension
            const hasExtension = file.name.includes('.');
            if (hasExtension) {
                results.push({
                    pass: true,
                    message: `File has extension: .${file.name.split('.').pop()}`
                });
            } else {
                results.push({
                    pass: false,
                    message: 'File has no extension'
                });
            }

            return results;
        }

        function displayValidationResults(results) {
            const validationChecks = document.getElementById('validationChecks');
            const statusMessage = document.getElementById('statusMessage');
            
            const allPassed = results.every(r => r.pass);
            
            // Set status message
            if (allPassed) {
                statusMessage.textContent = '✅ All validation checks passed!';
                statusMessage.className = 'status success';
            } else {
                statusMessage.textContent = '⚠️ Some validation checks failed';
                statusMessage.className = 'status warning';
            }

            // Display individual checks
            validationChecks.innerHTML = '<h3 style="margin-bottom: 10px; color: #667eea;">🔍 Validation Results</h3>';
            results.forEach(result => {
                const checkItem = document.createElement('div');
                checkItem.className = `check-item ${result.pass ? 'pass' : 'fail'}`;
                checkItem.innerHTML = `
                    <span class="check-icon">${result.pass ? '✓' : '✗'}</span>
                    <span>${result.message}</span>
                `;
                validationChecks.appendChild(checkItem);
            });
        }

        function previewImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const preview = document.getElementById('filePreview');
                preview.innerHTML = `
                    <h3 style="color: #667eea; margin-bottom: 10px;">🖼️ Image Preview</h3>
                    <img src="${e.target.result}" alt="Preview">
                `;
            };
            reader.readAsDataURL(file);
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
        }

        function resetUpload() {
            fileInfo.classList.remove('show');
            uploadArea.style.display = 'block';
            fileInput.value = '';
        }
    </script>
</body>
</html>
